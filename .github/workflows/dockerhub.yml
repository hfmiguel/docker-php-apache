name: Docker PHP CI/CD

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
  DOCKER_HUB_IMAGE_FPM_NAME: 8.4.21-fpm
  DOCKER_HUB_IMAGE_APACHE_NAME: 8.4.21-apache
  DOCKER_HUB_NAMESPACE: ${{ secrets.DOCKER_HUB_NAMESPACE }}
  GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

jobs:

  guardian:
    name: GitGuardian scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch all history so multiple commits can be scanned
      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1.25.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ env.GITGUARDIAN_API_KEY }}

  build-and-push-docker-hub:
    name: Push Docker image to Docker Hub
    needs: guardian
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract APACHE metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.DOCKER_HUB_IMAGE_APACHE_NAME }}:latest

      - name: Build and push Docker Apache image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.apache
          push: true
          tags: ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.DOCKER_HUB_IMAGE_APACHE_NAME }}:latest,
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract FPM metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.DOCKER_HUB_IMAGE_FPM_NAME }}:latest

      - name: Build and push Docker FPM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.fpm
          push: true
          tags: ${{ env.DOCKER_HUB_NAMESPACE }}/${{ env.DOCKER_HUB_IMAGE_FPM_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  create_release:
    name: Create Release
    needs: ["guardian", "build-and-push-docker-hub"]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout branch
      uses: actions/checkout@v4

    - name: Generate release tag
      id: generate_release_tag
      uses: amitsingh-007/next-release-tag@v5.0.0
      with:
        github_token: ${{ env.GITHUB_TOKEN }}
        tag_prefix: 'v'
        tag_template: 'yyyy.mm.dd.i'

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.generate_release_tag.outputs.next_release_tag }}
        release_name: Release ${{ steps.generate_release_tag.outputs.next_release_tag }}
        draft: false
        prerelease: false

    - uses: eregon/publish-release@v1
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      with:
        release_id: ${{ steps.create_release.outputs.id }}
